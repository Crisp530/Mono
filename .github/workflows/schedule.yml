name: Weekly A-Share Quant Screener

on:
  # 1. 定时触发 (Cron 表达式)
  schedule:
    # GitHub 服务器使用 UTC 时间。北京时间 = UTC + 8
    # 如果你想在每周五下午 15:30 (北京时间) 运行，对应的 UTC 时间是 07:30
    # 格式: 分 时 日 月 星期
    - cron: '30 7 * * 5'
    
  # 2. 允许手动点击按钮触发 (方便你随时测试)
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 虚拟环境

    steps:
      - name: 检出代码 (Checkout repository)
        uses: actions/checkout@v3

      - name: 设置 Python 环境 (Set up Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 指定 Python 版本

      - name: 安装依赖 (Install dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行选股脚本 (Run Screener Script)
        env:
          # 从 GitHub Secrets 中读取你的私密 Key
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python A-Share-Quant-Undefined.py
