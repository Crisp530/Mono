name: Monthly CANSLIM Screen

on:
  schedule:
    - cron: "0 11 1 * *"   # 每月1号 11:00 UTC = 北京时间19:00
  workflow_dispatch:

jobs:
  run-screen:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run screen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
          AI_ENABLED: ${{ vars.AI_ENABLED }}
          AI_REVIEW_MAX_STOCKS: ${{ vars.AI_REVIEW_MAX_STOCKS }}
          AI_TIMEOUT: ${{ vars.AI_TIMEOUT }}
          AI_TEMPERATURE: ${{ vars.AI_TEMPERATURE }}
          AI_MAX_OUTPUT_TOKENS: ${{ vars.AI_MAX_OUTPUT_TOKENS }}
        run: |
          python monthly_canslim_ai.py

      - name: Upload results files
        uses: actions/upload-artifact@v4
        with:
          name: canslim-results
          path: |
            canslim_results.csv
            canslim_failures.csv
            canslim_ai_review.json
            canslim_ai_reviews.csv
          if-no-files-found: ignore
